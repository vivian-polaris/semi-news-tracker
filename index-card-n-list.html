<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Semiconductor News Tracker</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0e17;--card:#131a2b;--border:#1e2a42;--accent:#3b82f6;--accent2:#8b5cf6;
--text:#e2e8f0;--text2:#94a3b8;--green:#10b981;--red:#ef4444;--orange:#f59e0b;--tag-bg:#1e293b}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:1200px;margin:0 auto;padding:20px}
header{text-align:center;padding:30px 0 20px}
header h1{font-size:1.8rem;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
header p{color:var(--text2);font-size:.9rem}

/* Search Bar */
.search-bar{margin:20px 0;position:relative}
.search-bar input{width:100%;padding:14px 20px 14px 44px;background:var(--card);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:1rem;outline:none;transition:border .2s}
.search-bar input:focus{border-color:var(--accent)}
.search-bar input::placeholder{color:var(--text2)}
.search-bar .icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text2);font-size:1.2rem}
.search-hint{color:var(--text2);font-size:.75rem;margin-top:6px;padding-left:4px}

/* Time Filter */
.time-filter{margin:16px 0}
.time-filter-label{color:var(--text2);font-size:.8rem;margin-bottom:8px;padding-left:2px}
.time-btns{display:flex;flex-wrap:wrap;gap:6px}
.time-btn{padding:6px 14px;background:var(--tag-bg);border:1px solid var(--border);border-radius:20px;color:var(--text2);cursor:pointer;font-size:.82rem;transition:all .2s;user-select:none}
.time-btn:hover{border-color:var(--accent2);color:var(--text)}
.time-btn.active{background:var(--accent2);border-color:var(--accent2);color:#fff}
.time-custom{display:none;gap:10px;align-items:center;flex-wrap:wrap;padding:12px;background:var(--card);border:1px solid var(--border);border-radius:10px;margin-top:10px}
.time-custom.show{display:flex}
.time-custom label{color:var(--text2);font-size:.82rem;display:flex;align-items:center;gap:6px;white-space:nowrap}
.time-custom input[type=datetime-local]{background:var(--tag-bg);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:5px 10px;font-size:.82rem;outline:none;color-scheme:dark}
.time-custom input[type=datetime-local]:focus{border-color:var(--accent)}
.time-apply-btn{padding:6px 16px;background:var(--accent);border:none;border-radius:6px;color:#fff;cursor:pointer;font-size:.82rem;white-space:nowrap;transition:background .2s}
.time-apply-btn:hover{background:#2563eb}
.time-notice{color:var(--orange);font-size:.75rem;margin-top:6px;padding-left:2px;display:none}
.time-notice.show{display:block}

/* Category Filters */
.filters{display:flex;flex-wrap:wrap;gap:8px;margin:16px 0 24px}
.filter-btn{padding:8px 16px;background:var(--tag-bg);border:1px solid var(--border);border-radius:20px;color:var(--text2);cursor:pointer;font-size:.85rem;transition:all .2s;user-select:none}
.filter-btn:hover{border-color:var(--accent);color:var(--text)}
.filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.filter-btn .count{margin-left:4px;font-size:.75rem;opacity:.7}

/* Stats Bar */
.stats-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding:0 4px}
.stats-bar .left{color:var(--text2);font-size:.85rem}
.stats-bar .right{display:flex;gap:8px}
.sort-btn{padding:4px 12px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--text2);cursor:pointer;font-size:.8rem}
.sort-btn.active{color:var(--accent);border-color:var(--accent)}
.view-btn{padding:4px 12px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--text2);cursor:pointer;font-size:.8rem;transition:all .2s}
.view-btn:hover{color:var(--accent2);border-color:var(--accent2)}

/* News Grid (Card View) */
.news-grid{display:grid;grid-template-columns:1fr;gap:12px}
@media(min-width:768px){.news-grid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:1024px){.news-grid{grid-template-columns:repeat(3,1fr)}}

/* News List (List View) */
.news-list{display:grid;grid-template-columns:1fr;gap:6px}
.news-list .news-card{flex-direction:row;align-items:center;gap:16px;padding:12px 16px}
.news-list .news-card .meta{flex-direction:column;align-items:flex-start;min-width:110px;gap:2px;margin-bottom:0}
.news-list .news-card h3{margin-bottom:0;font-size:.9rem;flex-grow:1}
.news-list .news-card .tags{flex-shrink:0}

.news-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;transition:all .2s;cursor:pointer;display:flex;flex-direction:column}
.news-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 4px 20px rgba(59,130,246,.1)}
.news-card .meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.news-card .source{color:var(--accent);font-size:.75rem;font-weight:600;text-transform:uppercase}
.news-card .time{color:var(--text2);font-size:.75rem}
.news-card h3{font-size:.95rem;line-height:1.4;margin-bottom:10px;flex-grow:1}
.news-card h3 a{color:var(--text);text-decoration:none}
.news-card h3 a:hover{color:var(--accent)}
.news-card .tags{display:flex;flex-wrap:wrap;gap:4px}
.tag{padding:2px 8px;background:var(--tag-bg);border-radius:4px;font-size:.7rem;color:var(--text2)}
.tag.foundry{color:var(--green);background:rgba(16,185,129,.1)}
.tag.fabless{color:var(--accent);background:rgba(59,130,246,.1)}
.tag.equipment{color:var(--orange);background:rgba(245,158,11,.1)}
.tag.memory{color:var(--accent2);background:rgba(139,92,246,.1)}
.tag.ai{color:var(--red);background:rgba(239,68,68,.1)}
.tag.material{color:#14b8a6;background:rgba(20,184,166,.1)}

/* Loading & States */
.loading{text-align:center;padding:60px;color:var(--text2)}
.loading .spinner{display:inline-block;width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:60px;color:var(--text2)}
.error-msg{text-align:center;padding:40px;color:var(--red);background:rgba(239,68,68,.05);border-radius:12px;margin:20px 0}

/* Refresh */
.refresh-bar{display:flex;justify-content:center;margin:8px 0 16px}
.refresh-btn{padding:8px 24px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text2);cursor:pointer;font-size:.85rem;transition:all .2s}
.refresh-btn:hover{border-color:var(--accent);color:var(--accent)}
.refresh-btn:disabled{opacity:.5;cursor:not-allowed}

/* Footer */
footer{text-align:center;padding:30px 0;color:var(--text2);font-size:.75rem;border-top:1px solid var(--border);margin-top:40px}

/* Company chips in search suggestions */
.suggestion-box{position:absolute;top:100%;left:0;right:0;background:var(--card);border:1px solid var(--border);border-radius:8px;margin-top:4px;z-index:10;display:none;padding:8px}
.suggestion-box.show{display:block}
.suggestion-item{padding:8px 12px;cursor:pointer;border-radius:6px;font-size:.85rem;color:var(--text2)}
.suggestion-item:hover{background:var(--tag-bg);color:var(--text)}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>&#x1F4E1; Semiconductor News Tracker</h1>
    <p>AI-Powered Industry Intelligence &mdash; 即時追蹤全球半導體產業動態</p>
  </header>

  <div class="search-bar">
    <span class="icon">&#x1F50D;</span>
    <input type="text" id="searchInput" placeholder="輸入搜尋...  例如: 半導體製造商 / TSMC / AI晶片 / 記憶體">
    <div class="suggestion-box" id="suggestionBox"></div>
    <div class="search-hint">&#x1F4A1; 試試: 「製造商」「IC設計」「AI公司」「設備商」「記憶體」或直接輸入公司名稱</div>
  </div>

  <div class="time-filter">
    <div class="time-filter-label">&#x1F552; 時間範圍</div>
    <div class="time-btns">
      <div class="time-btn active" data-period="all" onclick="setTimePeriod('all')">全部</div>
      <div class="time-btn" data-period="24h" onclick="setTimePeriod('24h')">24 小時</div>
      <div class="time-btn" data-period="1d" onclick="setTimePeriod('1d')">1 天</div>
      <div class="time-btn" data-period="1w" onclick="setTimePeriod('1w')">1 週</div>
      <div class="time-btn" data-period="1m" onclick="setTimePeriod('1m')">1 月</div>
      <div class="time-btn" data-period="custom" onclick="setTimePeriod('custom')">&#x270F;&#xFE0F; 自訂</div>
    </div>
    <div class="time-custom" id="timeCustom">
      <label>&#x23F0; 開始 <input type="datetime-local" id="startDate"></label>
      <label>&#x23F0; 結束 <input type="datetime-local" id="endDate"></label>
      <button class="time-apply-btn" onclick="applyCustomTime()">套用</button>
    </div>
    <div class="time-notice" id="timeNotice">&#x26A0;&#xFE0F; 自訂範圍最多 1 個月</div>
  </div>

  <div class="filters" id="filters"></div>

  <div class="refresh-bar">
    <button class="refresh-btn" id="refreshBtn" onclick="fetchAllNews()">&#x1F504; 重新載入新聞</button>
  </div>

  <div class="stats-bar">
    <span class="left" id="statsText">載入中...</span>
    <div class="right">
      <button class="sort-btn active" data-sort="time" onclick="setSort('time')">最新</button>
      <button class="sort-btn" data-sort="source" onclick="setSort('source')">來源</button>
      <button class="view-btn" id="viewBtn" onclick="toggleView()">&#x229E; 卡片式</button>
    </div>
  </div>

  <div class="news-list" id="newsGrid">
    <div class="loading"><div class="spinner"></div><br>正在載入新聞...</div>
  </div>

  <footer>
    Semiconductor News Tracker &copy; 2026 &mdash; 資料來源: Google News RSS
  </footer>
</div>

<script>
// ============================================================
// 公司與分類定義
// ============================================================
const CATEGORIES = {
  foundry: {
    label: '製造商 Foundry', emoji: '&#x1F3ED;',
    companies: ['TSMC','Samsung Foundry','GlobalFoundries','UMC','SMIC','Tower Semiconductor'],
    keywords: ['台積電','tsmc','聯電','三星晶圓','格芯','中芯','foundry','製造商','晶圓代工','代工']
  },
  fabless: {
    label: 'IC 設計 Fabless', emoji: '&#x1F4A0;',
    companies: ['NVIDIA','AMD','Qualcomm','Broadcom','MediaTek','Marvell','Arm'],
    keywords: ['nvidia','amd','高通','博通','聯發科','ic設計','fabless','輝達','超微','arm']
  },
  equipment: {
    label: '設備商 Equipment', emoji: '&#x2699;&#xFE0F;',
    companies: ['ASML','Applied Materials','Lam Research','KLA','Tokyo Electron','Disco'],
    keywords: ['asml','應材','科林研發','科磊','東京威力','設備商','equipment','半導體設備','光刻機','曝光機']
  },
  memory: {
    label: '記憶體 Memory', emoji: '&#x1F4BE;',
    companies: ['Samsung Memory','SK Hynix','Micron','Kioxia','Western Digital','Nanya'],
    keywords: ['三星記憶體','海力士','美光','鎧俠','記憶體','memory','dram','nand','hbm','南亞科']
  },
  ai: {
    label: 'AI 相關', emoji: '&#x1F916;',
    companies: ['NVIDIA AI','Google AI','Microsoft AI','Meta AI','Amazon AWS','OpenAI','Tesla AI'],
    keywords: ['ai晶片','ai chip','人工智慧','機器學習','gpu','accelerator','加速器','ai伺服器','ai server']
  },
  material: {
    label: '材料 / EDA', emoji: '&#x1F9EA;',
    companies: ['Synopsys','Cadence','Shin-Etsu','Sumco','Entegris'],
    keywords: ['eda','synopsys','cadence','矽晶圓','材料','photoresist','光阻','化學品']
  }
};

// 搜尋關鍵字 → 分類映射（自然語言）
const NL_MAPPINGS = [
  { patterns: ['製造','foundry','代工','晶圓廠','fab'], category: 'foundry' },
  { patterns: ['設計','fabless','ic設計','設計公司'], category: 'fabless' },
  { patterns: ['設備','equipment','光刻','曝光','蝕刻'], category: 'equipment' },
  { patterns: ['記憶體','memory','dram','nand','hbm','存儲'], category: 'memory' },
  { patterns: ['ai','人工智慧','機器學習','gpu','加速器'], category: 'ai' },
  { patterns: ['材料','eda','光阻','化學'], category: 'material' }
];

// ============================================================
// 狀態
// ============================================================
let allNews = [];
let activeCategories = new Set(Object.keys(CATEGORIES));
let currentSort = 'time';
let searchText = '';
let activePeriod = 'all';
let customStart = null;
let customEnd = null;
let viewMode = 'list';

// ============================================================
// 版面切換
// ============================================================
function toggleView() {
  viewMode = viewMode === 'grid' ? 'list' : 'grid';
  document.getElementById('newsGrid').className = viewMode === 'grid' ? 'news-grid' : 'news-list';
  document.getElementById('viewBtn').innerHTML = viewMode === 'grid' ? '&#x2630; 條列式' : '&#x229E; 卡片式';
}

// ============================================================
// 時間範圍功能
// ============================================================
function toLocalDatetimeStr(date) {
  const pad = n => String(n).padStart(2, '0');
  return date.getFullYear() + '-' + pad(date.getMonth()+1) + '-' + pad(date.getDate()) +
         'T' + pad(date.getHours()) + ':' + pad(date.getMinutes());
}

function setTimePeriod(period) {
  activePeriod = period;
  document.querySelectorAll('.time-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.period === period);
  });
  document.getElementById('timeCustom').classList.toggle('show', period === 'custom');
  document.getElementById('timeNotice').classList.toggle('show', period === 'custom');
  if (period !== 'custom') renderNews();
}

function applyCustomTime() {
  const s = document.getElementById('startDate').value;
  const e = document.getElementById('endDate').value;
  if (s && e && new Date(s) > new Date(e)) {
    alert('開始時間不能晚於結束時間');
    return;
  }
  if (s && e && (new Date(e) - new Date(s)) > 31 * 24 * 3600 * 1000) {
    alert('自訂範圍最多 1 個月');
    return;
  }
  customStart = s ? new Date(s) : null;
  customEnd = e ? new Date(e) : null;
  renderNews();
}

function filterByTime(items) {
  const now = new Date();
  if (activePeriod === '24h') {
    const cutoff = new Date(now - 24 * 3600 * 1000);
    return items.filter(n => new Date(n.pubDate) >= cutoff);
  }
  if (activePeriod === '1d') {
    const cutoff = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0);
    return items.filter(n => new Date(n.pubDate) >= cutoff);
  }
  if (activePeriod === '1w') {
    const cutoff = new Date(now - 7 * 24 * 3600 * 1000);
    return items.filter(n => new Date(n.pubDate) >= cutoff);
  }
  if (activePeriod === '1m') {
    const cutoff = new Date(now - 30 * 24 * 3600 * 1000);
    return items.filter(n => new Date(n.pubDate) >= cutoff);
  }
  if (activePeriod === 'custom') {
    return items.filter(n => {
      const d = new Date(n.pubDate);
      if (customStart && d < customStart) return false;
      if (customEnd && d > customEnd) return false;
      return true;
    });
  }
  return items;
}

function getPeriodLabel() {
  switch(activePeriod) {
    case '24h': return '（24 小時內）';
    case '1d': return '（今天）';
    case '1w': return '（近 1 週）';
    case '1m': return '（近 1 月）';
    case 'custom': {
      const s = customStart ? customStart.toLocaleDateString('zh-TW') : '';
      const e = customEnd ? customEnd.toLocaleDateString('zh-TW') : '';
      if (s || e) return '（' + (s || '...') + ' ～ ' + (e || '...') + '）';
      return '';
    }
    default: return '';
  }
}

// ============================================================
// CORS Proxy + Google News RSS
// ============================================================
const CORS_PROXIES = [
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
];
let proxyIndex = 0;

function getProxy(url) {
  return CORS_PROXIES[proxyIndex % CORS_PROXIES.length](url);
}

function buildGoogleNewsUrl(query) {
  let when = 'when:30d';
  if (activePeriod === '24h' || activePeriod === '1d') {
    when = 'when:1d';
  } else if (activePeriod === '1w') {
    when = 'when:7d';
  } else if (activePeriod === 'custom') {
    const parts = [];
    if (customStart) parts.push('after:' + customStart.toISOString().split('T')[0]);
    if (customEnd) parts.push('before:' + customEnd.toISOString().split('T')[0]);
    if (parts.length) when = parts.join(' ');
  }
  return `https://news.google.com/rss/search?q=${encodeURIComponent(query + ' ' + when)}&hl=zh-TW&gl=TW&ceid=TW:zh-Hant`;
}

async function fetchRSS(query) {
  const rssUrl = buildGoogleNewsUrl(query);
  const proxyUrl = getProxy(rssUrl);
  const res = await fetch(proxyUrl, { signal: AbortSignal.timeout(12000) });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const text = await res.text();
  const parser = new DOMParser();
  const xml = parser.parseFromString(text, 'text/xml');
  const items = xml.querySelectorAll('item');
  const results = [];
  items.forEach(item => {
    const title = item.querySelector('title')?.textContent || '';
    const link = item.querySelector('link')?.textContent || '';
    const pubDate = item.querySelector('pubDate')?.textContent || '';
    const source = item.querySelector('source')?.textContent || '';
    results.push({ title, link, pubDate, source, query });
  });
  return results;
}

// ============================================================
// 新聞抓取 (並行)
// ============================================================
async function fetchAllNews() {
  const grid = document.getElementById('newsGrid');
  const btn = document.getElementById('refreshBtn');
  grid.innerHTML = '<div class="loading"><div class="spinner"></div><br>正在載入新聞...</div>';
  btn.disabled = true;
  btn.textContent = '載入中...';

  const queries = [];
  for (const [catId, cat] of Object.entries(CATEGORIES)) {
    const topCompanies = cat.companies.slice(0, 4);
    const q = topCompanies.map(c => c.replace(/ (AI|Memory|Foundry)$/, '')).join(' OR ');
    queries.push({ catId, query: q + ' semiconductor' });
  }

  const results = await Promise.allSettled(
    queries.map(async ({ catId, query }) => {
      try {
        const items = await fetchRSS(query);
        return items.slice(0, 10).map(item => ({ ...item, category: catId }));
      } catch (e) {
        console.warn(`Failed to fetch ${catId}:`, e.message);
        proxyIndex++;
        try {
          const items = await fetchRSS(query);
          return items.slice(0, 10).map(item => ({ ...item, category: catId }));
        } catch (e2) {
          console.error(`Fallback also failed for ${catId}:`, e2.message);
          return [];
        }
      }
    })
  );

  allNews = [];
  const seen = new Set();
  results.forEach(r => {
    if (r.status === 'fulfilled') {
      r.value.forEach(item => {
        if (!seen.has(item.link)) {
          seen.add(item.link);
          item.categories = detectCategories(item.title);
          if (!item.categories.includes(item.category)) {
            item.categories.push(item.category);
          }
          allNews.push(item);
        }
      });
    }
  });

  btn.disabled = false;
  btn.innerHTML = '&#x1F504; 重新載入新聞';
  renderFilters();
  renderNews();
}

// ============================================================
// 分類偵測
// ============================================================
function detectCategories(title) {
  const t = title.toLowerCase();
  const cats = [];
  for (const [catId, cat] of Object.entries(CATEGORIES)) {
    const match = cat.keywords.some(kw => t.includes(kw.toLowerCase())) ||
                  cat.companies.some(c => t.toLowerCase().includes(c.toLowerCase().replace(/ (ai|memory|foundry)$/i, '')));
    if (match) cats.push(catId);
  }
  return cats;
}

// ============================================================
// 自然語言搜尋處理
// ============================================================
function processNaturalLanguage(input) {
  const text = input.toLowerCase().trim();

  // 每次輸入都重置時間範圍為「全部」
  activePeriod = 'all';
  document.querySelectorAll('.time-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.period === 'all');
  });
  document.getElementById('timeCustom').classList.remove('show');
  document.getElementById('timeNotice').classList.remove('show');

  if (!text) {
    activeCategories = new Set(Object.keys(CATEGORIES));
    searchText = '';
    renderFilters();
    renderNews();
    return;
  }

  // 每次輸入都重置分類為「全部」，再判斷 NL 分類
  activeCategories = new Set(Object.keys(CATEGORIES));
  const matchedCats = new Set();
  for (const mapping of NL_MAPPINGS) {
    if (mapping.patterns.some(p => text.includes(p))) {
      matchedCats.add(mapping.category);
    }
  }
  if (matchedCats.size > 0) {
    activeCategories = matchedCats;
  }

  searchText = text;
  renderFilters();
  renderNews();
}

// ============================================================
// 渲染
// ============================================================
function renderFilters() {
  const container = document.getElementById('filters');
  container.innerHTML = '';

  const allActive = activeCategories.size === Object.keys(CATEGORIES).length;
  const allBtn = document.createElement('div');
  allBtn.className = `filter-btn ${allActive ? 'active' : ''}`;
  allBtn.innerHTML = '&#x1F30D; 全部';
  allBtn.onclick = () => {
    activeCategories = new Set(Object.keys(CATEGORIES));
    searchText = '';
    document.getElementById('searchInput').value = '';
    renderFilters();
    renderNews();
  };
  container.appendChild(allBtn);

  for (const [catId, cat] of Object.entries(CATEGORIES)) {
    const btn = document.createElement('div');
    btn.className = `filter-btn ${activeCategories.has(catId) ? 'active' : ''}`;
    const count = allNews.filter(n => n.categories.includes(catId)).length;
    btn.innerHTML = `${cat.emoji} ${cat.label} <span class="count">(${count})</span>`;
    btn.onclick = () => {
      if (activeCategories.has(catId) && activeCategories.size === 1) {
        activeCategories = new Set(Object.keys(CATEGORIES));
      } else if (activeCategories.size === Object.keys(CATEGORIES).length) {
        activeCategories = new Set([catId]);
      } else if (activeCategories.has(catId)) {
        activeCategories.delete(catId);
      } else {
        activeCategories.add(catId);
      }
      renderFilters();
      renderNews();
    };
    container.appendChild(btn);
  }
}

function renderNews() {
  const grid = document.getElementById('newsGrid');
  let filtered = allNews.filter(n =>
    n.categories.some(c => activeCategories.has(c))
  );

  filtered = filterByTime(filtered);

  if (searchText) {
    const tokens = buildSearchTokens(searchText);
    if (tokens.length > 0) {
      filtered = filtered.filter(n => {
        const title = n.title.toLowerCase();
        return tokens.some(t => title.includes(t));
      });
    }
  }

  if (currentSort === 'time') {
    filtered.sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));
  } else {
    filtered.sort((a, b) => a.source.localeCompare(b.source));
  }

  document.getElementById('statsText').textContent =
    `顯示 ${filtered.length} 則新聞 / 共 ${allNews.length} 則${getPeriodLabel()}`;

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty">&#x1F4ED; 沒有符合條件的新聞，試試調整篩選條件或時間範圍</div>';
    return;
  }

  grid.innerHTML = filtered.map(item => {
    const timeAgo = getTimeAgo(new Date(item.pubDate));
    const tags = item.categories.map(c => {
      const cat = CATEGORIES[c];
      return `<span class="tag ${c}">${cat ? cat.label.split(' ')[0] : c}</span>`;
    }).join('');

    return `
      <div class="news-card" onclick="window.open('${escapeHtml(item.link)}','_blank')">
        <div class="meta">
          <span class="source">${escapeHtml(item.source)}</span>
          <span class="time">${timeAgo}</span>
        </div>
        <h3><a href="${escapeHtml(item.link)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${escapeHtml(item.title)}</a></h3>
        <div class="tags">${tags}</div>
      </div>
    `;
  }).join('');
}

function setSort(sort) {
  currentSort = sort;
  document.querySelectorAll('.sort-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.sort === sort);
  });
  renderNews();
}

// ============================================================
// 搜尋 Tokenizer（支援句子 / 中文 / 英文）
// ============================================================
function buildSearchTokens(text) {
  const t = text.toLowerCase().trim();
  if (!t) return [];
  const tokens = new Set();
  // 整句當作一個 token（支援直接 phrase match）
  tokens.add(t);
  // 按空格切分（英文句子）
  const parts = t.split(/\s+/).filter(p => p.length > 0);
  parts.forEach(p => tokens.add(p));
  // 中文部分：每個 2-char 組合（bigram）讓句子也能匹配
  parts.forEach(p => {
    if (/[\u4e00-\u9fff]/.test(p) && p.length > 2) {
      for (let i = 0; i <= p.length - 2; i++) {
        tokens.add(p.slice(i, i + 2));
      }
    }
  });
  // 排除過短或無意義的 token
  return [...tokens].filter(t => t.length >= 2);
}

// ============================================================
// 工具
// ============================================================
function getTimeAgo(date) {
  const now = new Date();
  const diff = (now - date) / 1000;
  if (isNaN(diff) || diff < 0) return '';
  if (diff < 60) return '剛剛';
  if (diff < 3600) return `${Math.floor(diff / 60)} 分鐘前`;
  if (diff < 86400) return `${Math.floor(diff / 3600)} 小時前`;
  if (diff < 604800) return `${Math.floor(diff / 86400)} 天前`;
  return date.toLocaleDateString('zh-TW');
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ============================================================
// 事件綁定
// ============================================================
let searchTimeout;
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => {
    processNaturalLanguage(e.target.value);
  }, 400);
});

document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    clearTimeout(searchTimeout);
    processNaturalLanguage(e.target.value);
  }
});

// ============================================================
// 初始化自訂時間預設值
// ============================================================
(function initCustomDates() {
  const now = new Date();
  const sevenDaysAgo = new Date(now - 7 * 24 * 3600 * 1000);
  document.getElementById('endDate').value = toLocalDatetimeStr(now);
  document.getElementById('startDate').value = toLocalDatetimeStr(sevenDaysAgo);
})();

// ============================================================
// 啟動
// ============================================================
renderFilters();
fetchAllNews();
</script>
