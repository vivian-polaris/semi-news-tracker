<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>半導體新聞 Pro</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0e17;--card:#131a2b;--card2:#192236;--border:#1e2a42;--accent:#3b82f6;--accent2:#8b5cf6;--text:#e2e8f0;--text2:#94a3b8;--green:#10b981;--orange:#f59e0b;--red:#ef4444;--tag:#1e293b}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.wrap{max-width:1080px;margin:0 auto;padding:16px 18px}
header{text-align:center;padding:20px 0 14px}
h1{font-size:1.55rem;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
header p{color:var(--text2);font-size:.82rem;margin-top:5px}
.lbl{color:var(--text2);font-size:.72rem;font-weight:600;letter-spacing:.04em;margin:12px 0 5px 2px}

/* Search */
.srch{position:relative;margin:14px 0 4px}
.srch input{width:100%;padding:13px 18px 13px 44px;background:var(--card);border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-size:.95rem;outline:none;transition:border .2s}
.srch input:focus{border-color:var(--accent)}
.srch input::placeholder{color:var(--text2)}
.srch .ico{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text2)}
.hint{color:var(--text2);font-size:.73rem;padding:0 3px;margin-bottom:2px}

/* Pills */
.row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.pill{padding:5px 13px;border-radius:20px;border:1px solid var(--border);background:var(--tag);color:var(--text2);cursor:pointer;font-size:.8rem;transition:all .18s;user-select:none;display:inline-flex;align-items:center;gap:4px}
.pill:hover{border-color:var(--accent2);color:var(--text)}
.pill.on{color:#fff}
.pill.src-on{background:var(--accent2);border-color:var(--accent2)}
.pill.time-on{background:var(--orange);border-color:var(--orange);color:#000}
.pill.l1-on{background:var(--accent);border-color:var(--accent)}
.pill.l2-on{background:var(--accent2);border-color:var(--accent2)}
.cnt{font-size:.68rem;opacity:.7}
.topic-pill{border-style:dashed}

/* Custom time */
.ctime{display:none;gap:10px;align-items:center;flex-wrap:wrap;padding:9px 12px;background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:8px}
.ctime.show{display:flex}
.ctime label{color:var(--text2);font-size:.78rem;display:flex;align-items:center;gap:5px}
.ctime input[type=date]{background:var(--tag);border:1px solid var(--border);border-radius:5px;color:var(--text);padding:4px 8px;font-size:.78rem;outline:none;color-scheme:dark}
.apply{padding:5px 14px;background:var(--accent);border:none;border-radius:6px;color:#fff;cursor:pointer;font-size:.78rem}

/* L2 panel */
.l2-panel{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:10px 12px;margin-bottom:8px;display:none}
.l2-panel.show{display:block}
.l2-group{font-size:.68rem;color:var(--text2);font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin:8px 0 5px}
.l2-group:first-child{margin-top:0}

/* Stats */
.stats{display:flex;justify-content:space-between;align-items:center;margin:10px 0 8px;padding:0 2px}
.stats .st{color:var(--text2);font-size:.8rem}
.stats .sr{display:flex;gap:5px}
.sbtn{padding:3px 10px;border:1px solid var(--border);border-radius:5px;color:var(--text2);cursor:pointer;font-size:.75rem;background:transparent;transition:all .2s}
.sbtn.on{color:var(--accent);border-color:var(--accent)}

/* News list */
.nlist{display:flex;flex-direction:column;gap:6px}
.card{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:12px 15px;cursor:pointer;transition:all .18s;display:flex;flex-direction:column;gap:6px}
.card:hover{border-color:var(--accent);background:var(--card2)}
.card.clive{border-left:3px solid var(--green)}
.card.cpaper{border-left:3px solid var(--accent2)}
.ctop{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}
.csrc{color:var(--accent);font-size:.7rem;font-weight:600}
.ctime-txt{color:var(--text2);font-size:.7rem}
.ctitle{font-size:.9rem;line-height:1.45;color:var(--text)}
.ctitle a{color:inherit;text-decoration:none}
.ctitle a:hover{color:var(--accent)}
.csumm{font-size:.76rem;color:var(--text2);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ctags{display:flex;flex-wrap:wrap;gap:4px;align-items:center}
.badge{display:inline-block;padding:2px 7px;border-radius:3px;font-size:.65rem}
.bn{background:rgba(59,130,246,.1);color:var(--accent);border:1px solid rgba(59,130,246,.25)}
.bp{background:rgba(139,92,246,.1);color:var(--accent2);border:1px solid rgba(139,92,246,.25)}
.bl{background:rgba(16,185,129,.1);color:var(--green);border:1px solid rgba(16,185,129,.25)}
.tl1{padding:2px 7px;border-radius:3px;font-size:.65rem;background:var(--tag);color:var(--text2)}
.tl2{padding:2px 7px;border-radius:3px;font-size:.65rem;background:rgba(139,92,246,.08);color:var(--accent2)}

/* Dividers */
.div-row{color:var(--text2);font-size:.76rem;padding:5px 2px 3px;border-top:1px solid var(--border);margin-top:5px}

/* Loading */
.loading{text-align:center;padding:44px;color:var(--text2)}
.spin{display:inline-block;width:26px;height:26px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp .8s linear infinite;margin-bottom:9px}
@keyframes sp{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:44px;color:var(--text2)}

/* Info box */
.infobox{background:rgba(139,92,246,.07);border:1px solid rgba(139,92,246,.18);border-radius:7px;padding:8px 13px;font-size:.75rem;color:var(--text2);margin:6px 0}

/* Refresh */
.rfwrap{display:flex;justify-content:center;margin:8px 0}
.rfbtn{padding:7px 20px;background:var(--card);border:1px solid var(--border);border-radius:7px;color:var(--text2);cursor:pointer;font-size:.8rem;transition:all .2s}
.rfbtn:hover{border-color:var(--accent);color:var(--accent)}
.rfbtn:disabled{opacity:.5;cursor:not-allowed}
footer{text-align:center;padding:22px 0;color:var(--text2);font-size:.7rem;border-top:1px solid var(--border);margin-top:28px}
</style>
</head>
<body>

  <header>
    <h1>🔬 半導體新聞追蹤器 Pro</h1>

</div>

// ================================================================
// State
// ================================================================
let allNews=[], liveNews=[], arxivNews=[];
let activeL1='all', activeL2='all';
let timePeriod='month', customStart=null, customEnd=null;
let searchText='', activeSrc='all', sortBy='time';
let isSearching=false, currentQ='';

// ================================================================
// CORS proxy
// ================================================================
const PROX=[u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,u=>`https://corsproxy.io/?${encodeURIComponent(u)}`];
let pi=0;
const proxy=u=>PROX[pi%PROX.length](u);

// ================================================================
// Date helpers
// ================================================================
function daysBack(){return{today:1,week:7,month:30,'3month':90}[timePeriod]||30;}
function afterDate(){
  if(timePeriod==='custom'&&customStart) return customStart.toISOString().split('T')[0];
  return new Date(Date.now()-daysBack()*86400000).toISOString().split('T')[0];
}
function inRange(pub){
  const d=new Date(pub); if(isNaN(d)) return false;
  if(d<new Date('2022-01-01')) return false;  // hard min
  if(timePeriod==='custom'){
    if(customStart&&d<customStart) return false;
    if(customEnd&&d>customEnd) return false;
    return true;
  }
  return d>=new Date(Date.now()-daysBack()*86400000);
}
function timeAgo(pub){
  const d=new Date(pub); if(isNaN(d)) return '';
  const s=(Date.now()-d)/1000;
  if(s<60) return '剛剛';
  if(s<3600) return Math.floor(s/60)+' 分鐘前';
  if(s<86400) return Math.floor(s/3600)+' 小時前';
  if(s<604800) return Math.floor(s/86400)+' 天前';
  return d.toLocaleDateString('zh-TW');
}
function periodLabel(){
  const m={today:'今天',week:'本週',month:'本月','3month':'近3個月'};
  if(timePeriod==='custom'){
    const s=customStart?customStart.toLocaleDateString('zh-TW'):'';
    const e=customEnd?customEnd.toLocaleDateString('zh-TW'):'';
    return (s||e)?`（${s||'...'}～${e||'...'}）`:'';
  }
  return m[timePeriod]?`（${m[timePeriod]}）`:'';
}
function toDateStr(d){return d.toISOString().split('T')[0];}

// ================================================================
// Category matching
// ================================================================
function detectL1(title){
  const t=title.toLowerCase();
  for(const[k,c]of Object.entries(CAT)) if(c.kw.some(w=>t.includes(w))) return k;
  return null;
}
function detectL2(title,l1k){
  if(!l1k||!CAT[l1k]) return null;
  const t=title.toLowerCase();
  for(const[k,s]of Object.entries(CAT[l1k].subs)) if(s.kw.some(w=>t.includes(w))) return k;
  return null;
}
function passL1(title){
  if(activeL1==='all') return true;
  return CAT[activeL1].kw.some(w=>title.toLowerCase().includes(w));
}
function passL2(title){
  if(activeL1==='all'||activeL2==='all') return true;
  return CAT[activeL1].subs[activeL2].kw.some(w=>title.toLowerCase().includes(w));
}

// ================================================================
// Fetch Google News RSS
// ================================================================
async function fetchRSS(query){
  const after=afterDate();
  const q=`${query} after:${after}`;
  const url=`https://news.google.com/rss/search?q=${encodeURIComponent(q)}&hl=zh-TW&gl=TW&ceid=TW:zh-Hant`;
  const r=await fetch(proxy(url),{signal:AbortSignal.timeout(13000)});
  if(!r.ok) throw new Error('HTTP '+r.status);
  const xml=new DOMParser().parseFromString(await r.text(),'text/xml');
  const items=[];
  xml.querySelectorAll('item').forEach(el=>{
    const g=s=>(el.querySelector(s)||{textContent:''}).textContent;
    const pub=g('pubDate');
    if(!inRange(pub)) return;
    items.push({type:'news',title:g('title'),link:g('link'),pub,source:g('source'),summary:''});
  });
  return items;
}

// ================================================================
// Fetch arXiv
// ================================================================
async function fetchArxiv(query){
  const url=`https://export.arxiv.org/api/query?search_query=all:${encodeURIComponent(query)}&max_results=20&sortBy=submittedDate&sortOrder=descending`;
  const r=await fetch(proxy(url),{signal:AbortSignal.timeout(13000)});
  if(!r.ok) throw new Error('arXiv '+r.status);
  const xml=new DOMParser().parseFromString(await r.text(),'text/xml');
  const items=[];
  xml.querySelectorAll('entry').forEach(el=>{
    const g=s=>(el.querySelector(s)||{textContent:''}).textContent.trim();
    const pub=g('published');
    if(!inRange(pub)) return;
    items.push({
      type:'paper',
      title:g('title').replace(/\s+/g,' '),
      link:g('id').replace('http://','https://'),
      pub,source:'arXiv',
      summary:g('summary').replace(/\s+/g,' ').slice(0,220)+'…'
    });
  });
  return items;
}

// ================================================================
// Page load: fetch per L1 category
// ================================================================
async function fetchAll(){
  const list=document.getElementById('nlist');
  const btn=document.getElementById('rfbtn');
  list.innerHTML='<div class="loading"><div class="spin"></div><br>正在載入新聞...</div>';
  btn.disabled=true; btn.textContent='載入中...';

  const queries=Object.entries(CAT).map(([k,c])=>({
    q: c.kw.slice(0,3).join(' OR ')+' semiconductor'
  }));

  const res=await Promise.allSettled(queries.map(async({q})=>{
    try{return await fetchRSS(q);}
    catch{pi++;try{return await fetchRSS(q);}catch{return[];}}
  }));

  const seen=new Set();
  allNews=[];
  res.forEach(r=>{
    if(r.status==='fulfilled') r.value.forEach(n=>{
      if(!seen.has(n.link)){seen.add(n.link);allNews.push(n);}
    });
  });

  btn.disabled=false; btn.innerHTML='🔄 重新載入新聞';
  renderL1(); render();
}

// ================================================================
// Live search
// ================================================================
let liveTimer;
async function doSearch(q){
  if(!q||q.length<2){liveNews=[];arxivNews=[];isSearching=false;render();return;}
  currentQ=q; isSearching=true;
  document.getElementById('stxt').textContent='🔍 搜尋中...';

  const wantPaper=activeSrc!=='news'&&/論文|paper|research|arxiv|ieee|iedm|vlsi|isscc|preprint/i.test(q);
  try{
    const[nr,ar]=await Promise.allSettled([
      fetchRSS(q),
      wantPaper?fetchArxiv(q):Promise.resolve([])
    ]);
    if(currentQ!==q) return;
    const ex=new Set(allNews.map(n=>n.link));
    liveNews=nr.status==='fulfilled'?nr.value.filter(n=>!ex.has(n.link)):[];
    arxivNews=ar.status==='fulfilled'?ar.value:[];
  }catch(e){
    if(currentQ===q){liveNews=[];arxivNews=[];}
  }
  isSearching=false;
  if(currentQ===q) render();
}

// ================================================================
// Render L1
// ================================================================
function renderL1(){
  const row=document.getElementById('l1row');
  let h='<div class="pill l1-on on" onclick="setL1(\'all\')">🌍 全部</div>';
  for(const[k,c]of Object.entries(CAT)){
    const cnt=allNews.filter(n=>c.kw.some(w=>n.title.toLowerCase().includes(w))).length;
    const on=activeL1===k;
    h+=`<div class="pill${on?' l1-on on':''}" onclick="setL1('${k}')">${c.emoji} ${c.label} <span class="cnt">(${cnt})</span></div>`;
  }
  row.innerHTML=h;
  // fix "全部" active state
  row.firstElementChild.className='pill'+(activeL1==='all'?' l1-on on':'');
}

function setL1(k){
  activeL1=(activeL1===k&&activeL2==='all')?'all':k;
  activeL2='all';
  renderL1(); renderL2(); render();
}

// ================================================================
// Render L2
// ================================================================
function renderL2(){
  const p=document.getElementById('l2panel');
  if(activeL1==='all'){p.className='l2-panel';return;}
  p.className='l2-panel show';
  const subs=CAT[activeL1].subs;
  const cos=Object.entries(subs).filter(([,s])=>s.t==='co');
  const tps=Object.entries(subs).filter(([,s])=>s.t==='tp');
  let h='';
  if(cos.length){
    h+='<div class="l2-group">🏢 公司</div><div class="row">';
    h+=`<div class="pill${activeL2==='all'?' l2-on on':''}" onclick="setL2('all')">全部</div>`;
    cos.forEach(([k,s])=>h+=`<div class="pill${activeL2===k?' l2-on on':''}" onclick="setL2('${k}')">${s.label}</div>`);
    h+='</div>';
  }
  if(tps.length){
    h+='<div class="l2-group">🔬 技術主題</div><div class="row">';
    tps.forEach(([k,s])=>h+=`<div class="pill topic-pill${activeL2===k?' l2-on on':''}" onclick="setL2('${k}')">${s.label}</div>`);
    h+='</div>';
  }
  p.innerHTML=h;
}

function setL2(k){activeL2=k;renderL2();render();}

// ================================================================
// Main render
// ================================================================
function buildTokens(txt){
  const t=txt.toLowerCase().trim(); if(!t) return[];
  const s=new Set([t]);
  t.split(/\s+/).forEach(p=>{if(p.length>=2)s.add(p);});
  t.split(/\s+/).forEach(p=>{
    if(/[\u4e00-\u9fff]/.test(p)&&p.length>2)
      for(let i=0;i<=p.length-2;i++) s.add(p.slice(i,i+2));
  });
  return[...s].filter(x=>x.length>=2);
}

function passSearch(title){
  if(!searchText) return true;
  const toks=buildTokens(searchText);
  return!toks.length||toks.some(t=>title.toLowerCase().includes(t));
}

function render(){
  const list=document.getElementById('nlist');
  const sortFn=sortBy==='time'?(a,b)=>new Date(b.pub)-new Date(a.pub):(a,b)=>a.source.localeCompare(b.source);

  const base=allNews.filter(n=>
    inRange(n.pub)&&passL1(n.title)&&passL2(n.title)&&
    (activeSrc==='all'||activeSrc==='news')&&passSearch(n.title)
  ).sort(sortFn);

  const live=liveNews.filter(n=>
    inRange(n.pub)&&passL1(n.title)&&passL2(n.title)&&
    (activeSrc==='all'||activeSrc==='news')
  ).sort(sortFn);

  const papers=arxivNews.filter(n=>
    inRange(n.pub)&&(activeSrc==='all'||activeSrc==='paper')
  ).sort(sortFn);

  const total=base.length+live.length+papers.length;
  const suffix=isSearching?' ⏳ 搜尋中...':
    (searchText&&(live.length||papers.length)?` + 即時 ${live.length+papers.length} 則`:'');
  document.getElementById('stxt').textContent=
    `顯示 ${total} 則${periodLabel()} / 預載 ${allNews.length} 則${suffix}`;

  if(total===0){
    list.innerHTML=isSearching
      ?'<div class="loading"><div class="spin"></div><br>搜尋中...</div>'
      :'<div class="empty">📭 沒有符合結果，試試調整時間範圍或關鍵字</div>';
    return;
  }

  let h='';
  if(papers.length){
    h+=`<div class="div-row">📄 arXiv 論文（${papers.length} 篇）</div>`;
    h+='<div class="infobox">💡 arXiv 主要為學術預印本（cs / physics / eess 類）。IEDM、ISSCC 等 IEEE 付費論文請至 <a href="https://ieeexplore.ieee.org" target="_blank" style="color:var(--accent2)">ieeexplore.ieee.org</a> 查詢。</div>';
    papers.forEach(n=>{h+=cardHTML(n,'paper');});
    if(live.length+base.length) h+=`<div class="div-row">📰 新聞</div>`;
  }
  if(live.length){
    if(!papers.length) h+=`<div class="div-row">📡 即時搜尋結果（${live.length} 則）</div>`;
    live.forEach(n=>{h+=cardHTML(n,'live');});
    if(base.length) h+=`<div class="div-row">📰 已載入新聞（${base.length} 則）</div>`;
  }
  base.forEach(n=>{h+=cardHTML(n,'news');});
  list.innerHTML=h;
}

// ================================================================
// Card HTML
// ================================================================
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function cardHTML(n,kind){
  const ago=timeAgo(n.pub);
  const date=new Date(n.pub);
  const dateStr=isNaN(date)?'':date.toLocaleDateString('zh-TW');
  const l1k=detectL1(n.title);
  const l2k=l1k?detectL2(n.title,l1k):null;
  const l1tag=l1k?`<span class="tl1">${CAT[l1k].emoji} ${CAT[l1k].label}</span>`:'';
  const l2tag=l2k?`<span class="tl2">${CAT[l1k].subs[l2k].label}</span>`:'';
  const badge={news:'<span class="badge bn">📰 新聞</span>',live:'<span class="badge bl">⚡ 即時</span>',paper:'<span class="badge bp">📄 論文</span>'}[kind];
  const cls='card'+(kind==='paper'?' cpaper':kind==='live'?' clive':'');
  const summ=n.summary?`<div class="csumm">${esc(n.summary)}</div>`:'';
  return `<div class="${cls}" onclick="window.open('${esc(n.link)}','_blank')">
    <div class="ctop"><span class="csrc">${esc(n.source)}</span><span class="ctime-txt" title="${dateStr}">${ago}</span></div>
    <div class="ctitle"><a href="${esc(n.link)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${esc(n.title)}</a></div>
    ${summ}
    <div class="ctags">${badge}${l1tag}${l2tag}</div>
  </div>`;
}

// ================================================================
// Controls
// ================================================================
function setSrc(s){
  activeSrc=s;
  document.querySelectorAll('#srcRow .pill').forEach(b=>b.className='pill'+(b.dataset.s===s?' src-on on':''));
  render();
}
function setTime(t){
  timePeriod=t;
  document.querySelectorAll('#timeRow .pill').forEach(b=>b.className='pill'+(b.dataset.t===t?' time-on on':''));
  document.getElementById('ctime').className='ctime'+(t==='custom'?' show':'');
  if(t!=='custom'){searchText?doSearch(searchText):fetchAll();}
}
function applyCustom(){
  const s=document.getElementById('sd').value;
  const e=document.getElementById('ed').value;
  if(s&&e&&new Date(s)>new Date(e)){alert('開始日期不能晚於結束');return;}
  customStart=s?new Date(s):null;
  customEnd=e?new Date(e+'T23:59:59'):null;
  searchText?doSearch(searchText):fetchAll();
}
function setSort(s){
  sortBy=s;
  document.querySelectorAll('.sbtn').forEach(b=>b.className='sbtn'+(b.dataset.so===s?' on':''));
  render();
}

// ================================================================
// Search input
// ================================================================
document.getElementById('si').addEventListener('input',e=>{
  const v=e.target.value.trim();
  searchText=v.toLowerCase();
  if(v){activeL1='all';activeL2='all';renderL1();renderL2();}
  render();
  clearTimeout(liveTimer);
  liveTimer=setTimeout(()=>doSearch(v),500);
});
document.getElementById('si').addEventListener('keydown',e=>{
  if(e.key==='Enter'){clearTimeout(liveTimer);doSearch(e.target.value.trim());}
});

// ================================================================
// Init
// ================================================================
(function(){
  const now=new Date(), ago=new Date(now-30*86400000);
  document.getElementById('ed').value=toDateStr(now);
  document.getElementById('sd').value=toDateStr(ago);
})();
renderL1(); renderL2();
fetchAll();
</script>
